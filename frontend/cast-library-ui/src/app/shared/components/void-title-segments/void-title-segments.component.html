@for (seg of segments(); track $index) {
  @if (seg.route) {
    <a [class]="'void-title__link' + (seg.cssClass ? ' ' + seg.cssClass : '') + (isSingleTitle() ? ' void-title__single-title' : '')" [routerLink]="seg.route">{{ seg.text }}</a>
  } @else {
    <span [class]="(seg.cssClass || '') + (isSingleTitle() ? ' void-title__single-title' : '')">{{ seg.text }}</span>
  }
}
