<div class="fsp-root">

  <!-- ── Trigger button ── -->
  <button class="campaign-primary-btn fsp-btn"
          type="button"
          (click)="togglePanel()">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true">
      <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9"/>
    </svg>
    Faction Accusation
    <svg class="fsp-caret" [class.fsp-caret--open]="panelOpen()"
         width="8" height="8" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  <!-- ── Slide-down faction panel ── -->
  @if (panelOpen()) {
    <div class="fsp-panel" role="region" aria-label="Faction symbol picker">
      <div class="fsp-panel-label">{{ panelLabel }}</div>

      @if (factions.length === 0) {
        <p class="fsp-empty">No visible factions in this campaign.</p>
      } @else {
        <div class="fsp-grid">
          @for (faction of factions; track faction.factionInstanceId) {
            <div class="fsp-card-wrap"
                 [class.fsp-card-wrap--assigned]="isAssigned(faction)"
                 [class.fsp-card-wrap--no-symbol]="!faction.symbolPath"
                 [class.fsp-card-wrap--disabled]="isMaxReached() && !isAssigned(faction)"
                 (click)="onFactionClick(faction)"
                 [attr.aria-label]="'Assign faction ' + faction.name + (isAssigned(faction) ? ' (assigned)' : '')"
                 role="button"
                 tabindex="0"
                 (keydown.enter)="onFactionClick(faction)"
                 (keydown.space)="onFactionClick(faction)">

              <!-- Symbol preview -->
              <div class="fsp-symbol-preview">
                @if (faction.symbolPath) {
                  <img [src]="faction.symbolPath" [alt]="faction.name + ' symbol'" />
                } @else {
                  <div class="fsp-symbol-placeholder">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
                      <circle cx="12" cy="12" r="9" opacity=".4"/>
                      <line x1="12" y1="8" x2="12" y2="16" opacity=".4"/>
                      <line x1="8" y1="12" x2="16" y2="12" opacity=".4"/>
                    </svg>
                  </div>
                }
              </div>

              <!-- Name -->
              <div class="fsp-card-name">{{ faction.name }}</div>

              <!-- Checkmark badge -->
              @if (isAssigned(faction)) {
                <div class="fsp-check" aria-label="Assigned">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </div>
              }
            </div>
          }
        </div>
      }

        </div>
      }

</div>
