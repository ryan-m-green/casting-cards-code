@if (content) {
  <div class="wso-backdrop" [style.--portal-color]="portalColor" (click)="dismiss()">
    <div class="wso-card" (click)="$event.stopPropagation()">

      <!-- Wizard image -->
      <div class="wso-figure-wrap">
        <img src="wizard.png" alt="Wizard" class="wso-image"/>
      </div>

      <!-- Header -->
      <div class="wso-header">✦ WHISPERS REACH YOU ✦</div>

      <!-- Secret text -->
      <div class="wso-secret-block">
        <div class="wso-secret-text">{{ content }}</div>
      </div>

      <!-- CTA -->
      <button class="wso-cta" (click)="goToSecrets.emit()">⚔ View My Character</button>

    </div>
  </div>
}
