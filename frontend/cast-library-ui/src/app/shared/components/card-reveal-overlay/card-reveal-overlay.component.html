@if (data) {
  <div class="cr-backdrop" (click)="dismiss()">
    <div class="cr-panel" (click)="$event.stopPropagation()">

      <!-- Card -->
      <div class="cr-card-wrap">
        @switch (data.cardType) {
          @case ('cast') {
            @if (castModel) {
              <app-cast-card
                [cast]="castModel"
                [flippable]="false"
                [editable]="false"
                [secretContent]="data.secretContent ?? null" />
            }
          }
          @case ('player') {
            @if (castModel) {
              <app-cast-card
                [cast]="castModel"
                [flippable]="false"
                [editable]="false"
                [secretContent]="data.secretContent ?? null" />
            }
          }
          @case ('location') {
            @if (locationModel) {
              <app-location-card
                [location]="locationModel"
                [flippable]="false"
                [editable]="false"
                [secretContent]="data.secretContent ?? null" />
            }
          }
          @case ('sublocation') {
            @if (sublocationModel) {
              <app-sublocation-card
                [sublocation]="sublocationModel"
                [flippable]="false"
                [editable]="false"
                [secretContent]="data.secretContent ?? null" />
            }
          }
        }
      </div>

      <!-- Dismiss -->
      <button class="cr-dismiss" (click)="dismiss()" aria-label="Dismiss">✕ Dismiss</button>
    </div>
  </div>
}
