@if (shouldShow()) {
  @if (isGate()) {
    <div class="subscription-gate">
      <div class="gate-content">
        <div class="gate-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="currentColor"/>
          </svg>
        </div>
        <h2 class="gate-title">Subscription Suspended</h2>
        <p class="gate-message">{{ bannerMessage() }}</p>
        <button class="gate-button" (click)="updatePayment()">Update Payment Method</button>
      </div>
    </div>
  } @else {
    <div class="subscription-banner" [ngClass]="bannerClass()">
      <div class="banner-content">
        <div class="banner-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="currentColor"/>
          </svg>
        </div>
        <span class="banner-text">{{ bannerMessage() }}</span>
        <button class="banner-button" (click)="updatePayment()">Update Payment</button>
      </div>
    </div>
  }
}
