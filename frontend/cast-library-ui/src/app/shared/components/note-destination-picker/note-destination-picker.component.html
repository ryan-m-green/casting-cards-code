<div class="ndp-dest-btns">

  @if (showQueue) {
    <button type="button" class="ndp-dest-btn" [class.active]="destType === 'queue'" (click)="onDestTypeChange('queue')" title="Unsorted Queue" [tabIndex]="tabIndexBase">
      <svg class="ndp-dest-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
      </svg>
      <span>Queue</span>
    </button>
  }

  <button type="button" class="ndp-dest-btn" [class.active]="destType === 'cast'" (click)="onDestTypeChange('cast')" title="Cast Member" [tabIndex]="tabIndexBase">
    <svg class="ndp-dest-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Cast</span>
  </button>

  <button type="button" class="ndp-dest-btn" [class.active]="destType === 'faction'" (click)="onDestTypeChange('faction')" title="Faction" [tabIndex]="tabIndexBase">
    <svg class="ndp-dest-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <span>Faction</span>
  </button>

  <button type="button" class="ndp-dest-btn" [class.active]="destType === 'campaign'" (click)="onDestTypeChange('campaign')" title="Campaign Note" [tabIndex]="tabIndexBase">
    <svg class="ndp-dest-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    <span>Campaign</span>
  </button>

  <button type="button" class="ndp-dest-btn" [class.active]="destType === 'sublocation'" (click)="onDestTypeChange('sublocation')" title="Sublocation" [tabIndex]="tabIndexBase">
    <svg class="ndp-dest-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Sublocation</span>
  </button>

  <button type="button" class="ndp-dest-btn" [class.active]="destType === 'location'" (click)="onDestTypeChange('location')" title="Location" [tabIndex]="tabIndexBase">
    <svg class="ndp-dest-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    <span>Location</span>
  </button>

</div>

@if (showEntitySelect) {
  <div class="ndp-entity-row">
    @if (destType === 'location') {
      <app-campaign-dropdown
        class="ndp-entity-dropdown"
        [options]="locationOptions"
        [value]="entityId"
        fontSize="13px"
        (valueChange)="entityIdChange.emit($event)"
      />
    }
    @if (destType === 'sublocation') {
      <app-campaign-dropdown
        class="ndp-entity-dropdown"
        [options]="sublocationOptions"
        [value]="entityId"
        fontSize="13px"
        (valueChange)="entityIdChange.emit($event)"
      />
    }
    @if (destType === 'cast') {
      <app-campaign-dropdown
        class="ndp-entity-dropdown"
        [options]="castOptions"
        [value]="entityId"
        fontSize="13px"
        (valueChange)="entityIdChange.emit($event)"
      />
    }
    @if (destType === 'faction') {
      <app-campaign-dropdown
        class="ndp-entity-dropdown"
        [options]="factionOptions"
        [value]="entityId"
        fontSize="13px"
        (valueChange)="entityIdChange.emit($event)"
      />
    }
  </div>
}
