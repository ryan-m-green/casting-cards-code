@if (isOpen()) {
  <div class="secrets-backdrop" [class.is-closing]="isClosing()" (click)="close()"></div>

  <div class="secrets-drawer" [class.is-closing]="isClosing()" role="dialog" [attr.aria-label]="member()?.name + ' secrets'">
    <div class="secrets-header">
      <button class="secrets-close-btn" (click)="close()" aria-label="Close">✕</button>
      <span class="secrets-header-title">{{ member()?.name }}'s Secrets</span>
    </div>

    <div class="secrets-body">
      @if (loading()) {
        <div class="secrets-empty">Loading…</div>
      } @else if (secrets().length === 0) {
        <div class="secrets-empty">No shared secrets yet.</div>
      } @else {
        <ol class="secrets-list">
          @for (secret of secrets(); track secret.id) {
            <li class="secrets-item">{{ secret.content }}</li>
          }
        </ol>
      }
    </div>
  </div>
}
