@if (isDm()) {
  <div class="detail-panel-actions">
    @if (!editing()) {
      <button class="detail-edit-btn" [style.border-color]="editBtnBorderColor() || ''" (click)="startEditingClick.emit()">✎ Edit Details</button>
    } @else {
      <button class="campaign-primary-btn" (click)="saveDetailsClick.emit()">✔ Campaign</button>
      <button class="campaign-primary-btn" (click)="saveToLibraryClick.emit()">✔ Campaign + Library</button>
      <button class="campaign-secondary-btn" (click)="cancelEditingClick.emit()">✖</button>
    }
  </div>
}
