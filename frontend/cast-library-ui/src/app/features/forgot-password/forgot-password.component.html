<div class="pc">
  <a class="btn-ghost btn-back-link" routerLink="/">← Back</a>
  <h2 class="page-title page-title-sm">Forgot Password</h2>
  <p class="pnum form-subtitle">Enter your email to receive a reset link</p>

  @if (!submitted()) {
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-narrow">
      <label class="fi-label">Arcane Seal (Email)</label>
      <input class="fi" type="email" formControlName="email" placeholder="dm@example.com" />
      <button class="btn-primary btn-form-submit" type="submit" [disabled]="loading()">
        {{ loading() ? '…' : 'Send Reset Link' }}
      </button>
    </form>
  } @else {
    <div class="wb wb-narrow">
      <p class="wbd">If that email is registered, a reset link has been sent. Check your inbox.</p>
      <a class="btn-ghost btn-return-link" routerLink="/">Return to Sign In</a>
    </div>
  }

  <div class="orn orn-mt">· · ·</div>
</div>
