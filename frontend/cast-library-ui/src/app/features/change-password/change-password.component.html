<div class="pc scroll-body">
  <app-dm-nav />

  <h2 class="page-title page-title-sm">Change Password</h2>

  @if (success()) {
    <div class="wb wb-narrow">
      <p class="wbd">Password changed. Redirecting to dashboard…</p>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-narrow">
      <label class="fi-label">Current Password</label>
      <input class="fi" type="password" formControlName="currentPassword" placeholder="••••••••" />

      <label class="fi-label">New Password</label>
      <input class="fi" type="password" formControlName="newPassword" placeholder="••••••••" />

      <label class="fi-label">Confirm New Password</label>
      <input class="fi" type="password" formControlName="confirmPassword" placeholder="••••••••" />

      @if (form.hasError('mismatch') && form.get('confirmPassword')?.dirty) {
        <p class="password-mismatch">Passwords do not match.</p>
      }

      <button class="btn-primary btn-form-submit" type="submit" [disabled]="loading()">
        {{ loading() ? '…' : 'Update Password' }}
      </button>
    </form>

    @if (errorMsg()) {
      <div class="wb wb-narrow change-error-box">
        <p class="wbd text-error">{{ errorMsg() }}</p>
      </div>
    }
  }

  <div class="orn orn-mt">· · ·</div>
</div>
