@if (!nodes().length) {
  <div class="fweb-empty">
    <span class="fweb-empty-icon">⚜</span>
    <p class="fweb-empty-msg">No factions in this campaign yet</p>
  </div>
} @else {
  <div class="fweb-host">
    <!-- ── Legend ─────────────────────────────────────────────────────────── -->
    <div class="fweb-legend" aria-label="Legend">
      <div class="fweb-legend-row">
        <span class="fweb-legend-label">Relationships</span>
        <span class="fweb-legend-item fweb-legend-rel">─── Allied</span>
        <span class="fweb-legend-item fweb-legend-rival">● ● ● Rival</span>
        <span class="fweb-legend-item fweb-legend-rel">─ · ─ Enemy</span>
        <span class="fweb-legend-item fweb-legend-rel">· · · Neutral</span>
      </div>
      <div class="fweb-legend-row">
        <span class="fweb-legend-label">Members</span>
        <span class="fweb-legend-item fweb-legend-cast">👤 Cast</span>
        <span class="fweb-legend-item fweb-legend-subloc">📍 Sublocation</span>
      </div>
      <div class="fweb-legend-row">
        <span class="fweb-legend-label">Alignment</span>
        <span class="fweb-legend-item fweb-legend-good">🕊 Good</span>
        <span class="fweb-legend-item fweb-legend-neutral-align">⚖ Neutral</span>
        <span class="fweb-legend-item fweb-legend-evil">🗑 Evil</span>
      </div>
    </div>

    <svg
      class="fweb-svg"
      [attr.viewBox]="viewBox()"
      [attr.height]="svgHeight()"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="Faction registry web"
      role="img"
    >


      <!-- ── Relationship segments ─────────────────────────────────────── -->
      <g aria-hidden="true">
        @for (seg of spineSegments(); track seg.id) {
          <path
            [attr.id]="seg.id"
            [attr.d]="seg.d"
            fill="none"
            [attr.stroke]="relColor(seg.relType)"
            [attr.stroke-dasharray]="relDash(seg.relType)"
            [attr.stroke-width]="seg.relType === 'rival' ? 4 : 1.5"
            [attr.stroke-linecap]="seg.relType === 'rival' ? 'round' : 'butt'"
          />
        }
      </g>
      <!-- ── Relationship labels (drawn after all lines so they paint on top) ── -->
      <g aria-hidden="true">
        @for (seg of spineSegments(); track $index) {
          <!-- connector line from label right edge to the vertical segment -->
          <line
            [attr.x1]="relLabelConnector(seg).x1"
            [attr.y1]="relLabelConnector(seg).y1"
            [attr.x2]="relLabelConnector(seg).x2"
            [attr.y2]="relLabelConnector(seg).y2"
            [attr.stroke]="relColor(seg.relType)"
            stroke-width="1"
          />
          <rect
            [attr.x]="relLabelBox(seg).x - relLabelRect(seg.relType).w / 2"
            [attr.y]="relLabelBox(seg).y - relLabelRect(seg.relType).h / 2"
            [attr.width]="relLabelRect(seg.relType).w"
            [attr.height]="relLabelRect(seg.relType).h"
            [attr.stroke]="relColor(seg.relType)"
            class="fweb-rel-label-bg"
          />
          <text
            [attr.x]="relLabelBox(seg).x"
            [attr.y]="relLabelBox(seg).y"
            text-anchor="middle"
            dominant-baseline="middle"
            class="fweb-rel-label"
            [attr.fill]="relColor(seg.relType)"
          >{{ relLabel(seg.relType) }}</text>
        }
      </g>

      


      <!-- ── Faction nodes ─────────────────────────────────────────────────── -->
      @for (node of nodes(); track node.id) {
        <g
          class="fweb-faction-node"
          [attr.aria-label]="node.faction.name + ' — influence ' + node.faction.influence"
          [attr.filter]="influenceGlow(node.faction.influence)"
        >
          <!-- node body -->
          <rect
            [attr.x]="node.x"
            [attr.y]="node.y"
            [attr.width]="node.width"
            [attr.height]="node.height"
            rx="4"
            class="fweb-node-rect"
          />
          <!-- alignment icon -->
          <text
            [attr.x]="node.x + 10"
            [attr.y]="node.y + 17"
            dominant-baseline="middle"
            class="fweb-node-align-icon"
            [attr.fill]="alignColor(node.faction)"
          >{{ alignIcon(node.faction) }}</text>
          <!-- node name and dots wrapper -->
          <g>
            <!-- faction name -->
            <text
              [attr.x]="node.x + 34"
              [attr.y]="node.y + 12"
              dominant-baseline="middle"
              class="fweb-node-name"
            >{{ node.faction.name }}</text>
            <!-- influence label -->
            <text
              [attr.x]="node.x + 34"
              [attr.y]="node.y + 25"
              dominant-baseline="middle"
              class="fweb-node-label"
            >Influence</text>
            <!-- influence dots -->
            <text
              [attr.x]="node.x + 110"
              [attr.y]="node.y + 25"
              dominant-baseline="middle"
              class="fweb-node-dots"
              [attr.aria-label]="'Influence: ' + node.faction.influence"
            >{{ influenceDots(node.faction.influence) }}</text>
          </g>

          <!-- Cast section -->
          @if (node.casts.length > 0) {
            <g [attr.transform]="'translate(20, 0)'">
              <text
                [attr.x]="node.x + 12"
                [attr.y]="node.y + 48"
                class="fweb-section-title"
              >CAST</text>
              @for (cast of node.casts; track cast.id; let i = $index) {
                <g class="fweb-card-item">
                  @if (cast.isPrimary) {
                    <image
                      href="crown_gems.svg"
                      [attr.x]="node.x + 4"
                      [attr.y]="node.y + 58 + i * 16 - 8"
                      [attr.width]="crownSize"
                      [attr.height]="crownSize * 0.75"
                      class="fweb-crown"
                    />
                  }
                  <text
                    [attr.x]="node.x + 16"
                    [attr.y]="node.y + 58 + i * 16"
                    dominant-baseline="middle"
                    class="fweb-card-icon fweb-card-icon--cast"
                  >👤</text>
                  <text
                    [attr.x]="node.x + 34"
                    [attr.y]="node.y + 58 + i * 16"
                    dominant-baseline="middle"
                    class="fweb-card-label fweb-card-label--link"
                    [class.fweb-card-label--primary]="cast.isPrimary"
                    [attr.fill]="cast.isPrimary ? '#c8aeff' : '#9878d0'"
                    (click)="navigateToCast(cast.id)"
                  >{{ cast.name }}</text>
                </g>
              }
            </g>
          }

          <!-- Divider -->
          @if (node.casts.length > 0 && node.sublocations.length > 0) {
            <g [attr.transform]="'translate(-28, 0)'">
              <line
                [attr.x1]="node.x + 48"
                [attr.y1]="node.y + 48 + (node.casts.length > 0 ? sectionTitleH + node.casts.length * listItemH : 0) + 4"
                [attr.x2]="node.x + node.width - 48"
                [attr.y2]="node.y + 48 + (node.casts.length > 0 ? sectionTitleH + node.casts.length * listItemH : 0) + 4"
                class="fweb-divider"
              />
            </g>
          }

          <!-- Sublocation section -->
          @if (node.sublocations.length > 0) {
            <g [attr.transform]="'translate(20, 0)'">
              @let subOffset = 48 + (node.casts.length > 0 ? sectionTitleH + node.casts.length * listItemH : 0) + (node.casts.length > 0 && node.sublocations.length > 0 ? dividerH + 8 : 0);
              <text
                [attr.x]="node.x + 12"
                [attr.y]="node.y + subOffset"
                class="fweb-section-title"
              >SUBLOCATIONS</text>
              @for (sub of node.sublocations; track sub.id; let i = $index) {
                <g class="fweb-card-item">
                  @if (sub.isPrimary) {
                    <image
                      href="crown_gems.svg"
                      [attr.x]="node.x + 4"
                      [attr.y]="node.y + subOffset + 10 + i * 16 - 8"
                      [attr.width]="crownSize"
                      [attr.height]="crownSize * 0.75"
                      class="fweb-crown"
                    />
                  }
                  <text
                    [attr.x]="node.x + 16"
                    [attr.y]="node.y + subOffset + 10 + i * 16"
                    dominant-baseline="middle"
                    class="fweb-card-icon fweb-card-icon--subloc"
                  >📍</text>
                  <text
                    [attr.x]="node.x + 34"
                    [attr.y]="node.y + subOffset + 10 + i * 16"
                    dominant-baseline="middle"
                    class="fweb-card-label fweb-card-label--link"
                    [class.fweb-card-label--primary]="sub.isPrimary"
                    [attr.fill]="sub.isPrimary ? '#7ad898' : '#52a068'"
                    (click)="navigateToSublocation(sub.id)"
                  >{{ sub.name }}</text>
                </g>
              }
            </g>
          }
        </g>
      }

    </svg>
  </div>
}
