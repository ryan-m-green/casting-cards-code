<div class="pc scroll-body">
  <div class="wr wr-page-header">
    <button class="btn-ghost" (click)="goBack()" type="button">← Campaign</button>
  </div>
  <h2 class="page-title">Sublocations</h2>

  @if (loading()) {
    <p class="wbd" style="text-align:center;padding:24px 0;">Loading…</p>
  } @else if (allSublocations().length === 0) {
    <p class="wbd" style="text-align:center;padding:24px 0;font-style:italic;">
      No sublocations in the library yet.
    </p>
  }
</div>
