<app-void-nav-drawer
  [campaignId]="campaignId()"
  [campaign]="shellSvc.campaign()"
  [isDm]="isDm()"
  mode="dm"
  [style.--portal-color]="safeColor(shellSvc.campaign()?.spineColor)"
/>

<div class="void-canvas" [style.--portal-color]="safeColor(shellSvc.campaign()?.spineColor)">

  <!-- ── Top bar ── -->
  <div class="void-topbar">
    <div class="topbar-row">
      <div class="topbar-right">
        <button class="topbar-chronicle-btn" (click)="openChronicleDrawer()" title="Chronicles">
          <img class="chronicle-icon" src="/open_book_star_moon_storytelling.svg" alt="Chronicles" />
        </button>
      </div>
    </div>
    @if (shellSvc.titleContext(); as ctx) {
      <span class="void-title" [style.margin-top]="shellSvc.voidTitleTopMargin()">
        <app-void-title-segments [context]="ctx" />
      </span>
    } @else {
      <span class="void-title" [style.margin-top]="shellSvc.voidTitleTopMargin()">{{ shellSvc.title() }}</span>
    }
    <app-upgrade-badge
      [visible]="auth.isFreeTrial()"
      (badgeClick)="openUpgradeDrawer()"
      class="upgrade-badge-shell" />
  </div>

  <!-- ── Time of day bar ── -->
  @if (campaign(); as camp) {
    <app-time-of-day-bar
      [campaignId]="campaignId()"
      [isDm]="isDm()"
      [panelTheme]="'dark'"
      [todInput]="camp.timeOfDay ?? null"
    />
  }

  <!-- ── Page content ── -->
  <router-outlet />

</div>

<app-campaign-chronicle-drawer #chronicleDrawer
  [campaignId]="campaignId()"
  [isDmMode]="true"
  [portalColor]="safeColor(shellSvc.campaign()?.spineColor)"
/>
<div class="void-letterbox-top"></div>
<div class="void-letterbox-bottom"></div>
