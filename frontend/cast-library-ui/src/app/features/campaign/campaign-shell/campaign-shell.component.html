<div class="void-canvas" [style.--portal-color]="safeColor(campaign()?.spineColor)">

  <!-- ── Top bar ── -->
  <div class="void-topbar">
    <div class="topbar-row">
      <div class="void-breadcrumbs">
        @for (crumb of shellSvc.crumbs(); track $index) {
          @if ($index > 0) {
            <span class="void-crumb-sep">›</span>
          }
          <button class="void-back" (click)="crumb.action()">{{ crumb.label }}</button>
        }
      </div>
      @if (isDm()) {
        <button class="topbar-party-btn" (click)="goToTheParty()">⚔ The Party</button>
      }
    </div>
    <span class="void-title">{{ shellSvc.title() }}</span>
  </div>

  <!-- ── Time of day bar ── -->
  @if (campaign(); as camp) {
    <div class="tod-bar-section">
      <app-time-of-day-bar
        [campaignId]="campaignId()"
        [isDm]="isDm()"
        [panelTheme]="'dark'"
        [todInput]="camp.timeOfDay ?? null"
      />
    </div>
  }

  <!-- ── Page content ── -->
  <router-outlet />

</div>
