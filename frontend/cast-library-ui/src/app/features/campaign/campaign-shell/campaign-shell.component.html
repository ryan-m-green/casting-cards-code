<div class="void-canvas">

  <!-- ── Top bar ── -->
  <div class="void-topbar">
    <div class="topbar-row">
      <app-shell-breadcrumbs [crumbs]="shellSvc.crumbs()" />
      @if (isDm()) {
        <button class="topbar-party-btn" (click)="goToTheParty()">⚔ The Party</button>
      }
    </div>
    <span class="void-title">{{ shellSvc.title() }}</span>
  </div>

  <!-- ── Time of day bar ── -->
  @if (campaign(); as camp) {
    <div class="tod-bar-section">
      <app-time-of-day-bar
        [campaignId]="campaignId()"
        [isDm]="isDm()"
        [panelTheme]="'dark'"
        [todInput]="camp.timeOfDay ?? null"
      />
    </div>
  }

  <!-- ── Page content ── -->
  <router-outlet />

</div>
