<app-void-nav-drawer
  [campaignId]="campaignId()"
  [campaign]="shellSvc.campaign()"
  [isDm]="isDm()"
  mode="dm"
  [style.--portal-color]="safeColor(shellSvc.campaign()?.spineColor)"
/>

<div class="void-canvas" [style.--portal-color]="safeColor(shellSvc.campaign()?.spineColor)">

  <!-- ── Top bar ── -->
  <div class="void-topbar">
    @if (shellSvc.titleContext(); as ctx) {
      <span class="void-title" [style.margin-top]="shellSvc.voidTitleTopMargin()">
        <app-void-title-segments [context]="ctx" />
      </span>
    } @else {
      <span class="void-title" [style.margin-top]="shellSvc.voidTitleTopMargin()">{{ shellSvc.title() }}</span>
    }
  </div>

  <!-- ── Time of day bar ── -->
  @if (campaign(); as camp) {
    <div class="tod-bar-section">
      <app-time-of-day-bar
        [campaignId]="campaignId()"
        [isDm]="isDm()"
        [panelTheme]="'dark'"
        [todInput]="camp.timeOfDay ?? null"
      />
    </div>
  }

  <!-- ── Page content ── -->
  <router-outlet />

</div>
<div class="void-letterbox-top"></div>
<div class="void-letterbox-bottom"></div>
