<div class="city-card-pane">
  <div class="city-card-enlarged pc-card-city">
    <div class="lib-card-front">
      <div class="card-slot-front">
        <div class="card-front-header">
          <div class="card-name">{{ city().name }}</div>
          <div class="card-descriptor">{{ city().classification }}</div>
        </div>
        <div class="dv dv-card"></div>
        <div class="card-image-area">
          @if (city().imageUrl) {
            <img [src]="city().imageUrl" alt="" class="card-img-fill" />
          } @else {
            <div class="card-placeholder">
              <span class="card-initial city-card-initial-lg">{{ initial(city().name) }}</span>
            </div>
          }
          @if (city().description) {
            <div class="card-desc-overlay">
              <p class="card-desc-text">{{ city().description }}</p>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
