@if (campaign(); as camp) {
  @if (isDm()) {
    <!-- ── Locations grid ── -->
    <app-card-grid-layout
      sectionTitle="Locations"
      [isDm]="isDm()"
      [showImportCard]="true"
      [campaign]="campaign()"
      [importCardRef]="importCardRef"
      [targetGridEl]="locationsGridEl"
      [initialInstances]="camp.locations"
      [drawerOpen]="importCardRef?.drawerOpen() ?? false"
      [removableInstanceIds]="getRemovableInstanceIds()"
      [pendingInstanceIds]="getPendingInstanceIds()"
      gridClass="cl-grid"
      paddingClass="dm-padding"
      (importAdded)="onLocationAdded($event)"
      (importRemoved)="onLocationRemoved($event)"
    >
      @for (location of camp.locations; track location.instanceId) {
        @if (!location.isPartyAnchor) {
        <div class="card-wrap" [attr.data-instance-id]="location.instanceId">
          <app-location-card
            [location]="location"
            [flippable]="false"
            [editable]="false"
            [secrets]="true"
            [secretsRevealed]="location.isVisibleToPlayers"
            [campaignMode]="true"
            [tilt]="locationTilt(location.instanceId)"
            [style.opacity]="importCardRef?.pendingInstanceIds()?.has(location.instanceId) ? 0 : 1"
            (secretsClick)="toggleLocationVisibility(location)"
            (cardClick)="goToLocationDetail(location.instanceId)"
          />
          @if (importCardRef?.drawerOpen() && importCardRef?.removableInstanceIds()?.has(location.instanceId)) {
            <button
              class="card-remove-btn"
              (click)="importCardRef!.removeCard(location.instanceId, $event)"
              type="button"
              aria-label="Remove location"
            >✕</button>
          }
        </div>
        }
      }
    </app-card-grid-layout>
  }
}
