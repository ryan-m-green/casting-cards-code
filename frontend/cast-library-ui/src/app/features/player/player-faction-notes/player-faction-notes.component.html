<div class="faction-notes-panel">

  <div class="notes-panel-header">
    <span class="notes-panel-label">Faction Notes</span>
    @if (saving) {
      <span class="notes-saving">saving…</span>
    }
  </div>

  <div class="notes-section">
    @if (!isSessionActive()) {
      <div class="session-disabled-message">Session not active - notes disabled</div>
    }
    <textarea
      class="notes-textarea"
      rows="5"
      placeholder="Jot down anything you want to remember about this faction…"
      [value]="notesText"
      [readonly]="!isSessionActive()"
      (input)="onNotesInput($any($event.target).value)"
    ></textarea>
  </div>

</div>
