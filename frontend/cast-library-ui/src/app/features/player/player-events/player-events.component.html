<div class="pe-page">

  @if (loading()) {
    <div class="pe-empty">Loading…</div>
  } @else if (!events().length) {
    <div class="pe-empty">No plot events have been shared with you yet.</div>
  } @else {

    <!-- Filter bar -->
    <fieldset class="ev-filters">
      <legend class="ev-filters-legend">Filters</legend>
      <div class="ev-filter-group">
        <button type="button" class="ev-filter-btn" [class.ev-filter-btn--active]="typeFilters().includes('cast')" (click)="toggleTypeFilter('cast')" title="Cast">
          <svg class="ev-filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <button type="button" class="ev-filter-btn" [class.ev-filter-btn--active]="typeFilters().includes('faction')" (click)="toggleTypeFilter('faction')" title="Faction">
          <svg class="ev-filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </button>
        <button type="button" class="ev-filter-btn" [class.ev-filter-btn--active]="typeFilters().includes('location')" (click)="toggleTypeFilter('location')" title="Location">
          <svg class="ev-filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
        </button>
        <button type="button" class="ev-filter-btn" [class.ev-filter-btn--active]="typeFilters().includes('sublocation')" (click)="toggleTypeFilter('sublocation')" title="Sublocation">
          <svg class="ev-filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </button>
        <button type="button" class="ev-filter-btn" [class.ev-filter-btn--active]="typeFilters().includes('player')" (click)="toggleTypeFilter('player')" title="Player">
          <svg class="ev-filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </button>
        <button type="button" class="ev-filter-btn" [class.ev-filter-btn--active]="typeFilters().includes('campaign')" (click)="toggleTypeFilter('campaign')" title="Campaign">
          <svg class="ev-filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </button>
        <button type="button" class="ev-filter-btn" [class.ev-filter-btn--active]="typeFilters().includes('handout')" (click)="toggleTypeFilter('handout')" title="Handout">
          <svg class="ev-filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
      </div>
    </fieldset>

    @if (!filteredEvents().length) {
      <div class="pe-empty">No events match the current filters.</div>
    } @else {
      <div class="ev-list">
        @for (ev of filteredEvents(); track ev.id) {
          <app-player-event-card-item
            [event]="ev"
            [expanded]="expandedId() === ev.id"
            (toggle)="toggleExpand(ev.id)"
          />
        }
      </div>
    }
  }

</div>
