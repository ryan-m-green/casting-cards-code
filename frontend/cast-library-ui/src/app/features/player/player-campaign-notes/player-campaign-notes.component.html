<div class="location-notes-panel">

  <div class="notes-panel-header">
    <span class="notes-panel-label">Global Campaign Notes</span>
    @if (saving()) {
      <span class="notes-saving">saving…</span>
    }
  </div>

  <div class="notes-section">
    @if (!isSessionActive()) {
      <div class="session-disabled-message">Session not active - notes disabled</div>
    }
    <textarea
      #notesTextarea
      class="notes-textarea"
      rows="5"
      placeholder="Jot down anything you want to remember about this campaign…"
      (input)="onNotesInput($any($event.target).value)"
      [readonly]="!isSessionActive()"
    ></textarea>
  </div>

</div>
