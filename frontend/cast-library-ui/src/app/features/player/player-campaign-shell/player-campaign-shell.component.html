<app-void-nav-drawer
  [campaignId]="campaignId()"
  [campaign]="shellSvc.campaign()"
  [isDm]="isDm()"
  mode="player"
  [queueCount]="shellSvc.quicknoteQueueCount()"
  [style.--portal-color]="safeColor(campaign()?.spineColor)"
/>

<div class="void-canvas" [style.--portal-color]="safeColor(campaign()?.spineColor)">

  <div class="portal-breathe-overlay"></div>

  <!-- ── Quicknotes bar ── -->
  <app-quicknotes
    [campaignId]="campaignId()"
    [campaign]="campaign()"
  />

  <!-- ── Top bar ── -->
  <div class="void-topbar">
    <div class="topbar-row">
      <div class="topbar-right">
        <div class="purse-wrap">
          <button class="topbar-purse-btn" (click)="togglePurse()" title="Fortune"><img class="purse-icon" src="/treasure_chest_gold_coins.svg" alt="Fortune" /></button>
          @if (showPurse()) {
            <div class="purse-backdrop" (click)="closePurse()"></div>
            <div class="purse-panel">
              <app-currency-display [purse]="purse()" />
            </div>
          }
        </div>
      </div>
    </div>
    @if (shellSvc.titleContext(); as ctx) {
      <span class="void-title" [style.margin-top]="shellSvc.voidTitleTopMargin()">
        <app-void-title-segments [context]="ctx" />
      </span>
    } @else {
      <span class="void-title" [style.margin-top]="shellSvc.voidTitleTopMargin()">{{ shellSvc.title() }}</span>
    }
  </div>

  <!-- ── Time of day bar ── -->
  @if (campaign(); as camp) {
    <app-time-of-day-bar
      [campaignId]="campaignId()"
      [isDm]="isDm()"
      [allowInteraction]="true"
      [panelTheme]="'dark'"
      [todInput]="timeOfDay()"
    />
  }
  <div class="tod-badge-container">
    <app-card-reveal-badge
      [count]="cardRevealQueue().length"
      [hidden]="showOverlay()"
      (badgeClicked)="onBadgeClick()"
    />
  </div>

  <!-- ── Page content ── -->
  <router-outlet />

</div>
<div class="void-letterbox-top"></div>
<div class="void-letterbox-bottom"></div>
<div class="void-letterbox-top"></div>
<div class="void-letterbox-bottom"></div>

@if (showOverlay()) {
  <app-card-reveal-overlay
    [cards]="cardRevealQueue()"
    (dismissed)="dismissOverlay()"
    (goToSecrets)="navigateToSecrets()"
  />
}
