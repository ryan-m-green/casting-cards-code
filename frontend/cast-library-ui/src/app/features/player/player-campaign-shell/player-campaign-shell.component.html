<div class="void-canvas" [style.--portal-color]="safeColor(campaign()?.spineColor)">

  <!-- ── Top bar ── -->
  <div class="void-topbar">
    <div class="topbar-row">
      <app-shell-breadcrumbs [crumbs]="shellSvc.crumbs()" />
      <div class="topbar-right">
        <div class="purse-wrap">
          <button class="topbar-purse-btn" (click)="togglePurse()"><span class="purse-icon">💰</span> Purse</button>
          @if (showPurse()) {
            <div class="purse-backdrop" (click)="closePurse()"></div>
            <div class="purse-panel">
              <app-currency-display [purse]="purse()" />
            </div>
          }
        </div>
        <button class="topbar-party-btn" (click)="goToMyCharacter()">⚔ The Party</button>
      </div>
    </div>
    <span class="void-title">{{ shellSvc.title() }}</span>
  </div>

  <!-- ── Time of day bar ── -->
  @if (campaign(); as camp) {
    <div class="tod-bar-section">
      <app-time-of-day-bar
        [campaignId]="campaignId()"
        [isDm]="false"
        [panelTheme]="'dark'"
        [todInput]="timeOfDay()"
      />
    </div>
  }

  <!-- ── Page content ── -->
  <router-outlet />

</div>

<app-card-reveal-overlay
  [data]="overlayData()"
  (dismissed)="dismissOverlay()"
/>

<app-whisper-card
  [content]="wizardSecretContent()"
  [recipient]="wizardSecretRecipient()"
  [portalColor]="campaign()?.spineColor ?? '#6e28d0'"
  [dismissable]="false"
  (dismissed)="dismissWizardSecret()"
  (goToSecrets)="navigateToSecrets()"
/>

@if (showGoldCard()) {
  <app-currency-card
    [amount]="goldCardAmount()"
    [currency]="goldCardCurrency()"
    [note]="goldCardNote()"
    [portalColor]="campaign()?.spineColor ?? '#6e28d0'"
    [dismissable]="true"
    (dismissed)="dismissGoldCard()"
  />
}
