<div class="pc scroll-body">
  <app-dm-nav />
  <div class="wr wr-page-header">
    <button class="btn-ghost" routerLink="/dm/dashboard">← Back</button>
    <h2 class="page-title page-title-row">Sublocation Library</h2>
    <button class="btn-primary" routerLink="/dm/sublocations/new">+ Create Sublocation</button>
  </div>

  <div class="card-grid">
    @for (subloc of sublocations(); track subloc.id) {
      <app-sublocation-card
        [sublocation]="subloc"
        (editClick)="edit(subloc.id)"
        (deleteClick)="confirmDelete(subloc.id)">
      </app-sublocation-card>
    }
    @empty {
      <p class="wbd empty-state-pad">No sublocations found.</p>
    }
  </div>
</div>

@if (pendingDeleteId()) {
  <div class="delete-overlay" (click)="cancelDelete()">
    <div class="delete-panel" (click)="$event.stopPropagation()">
      <div class="delete-panel-title">Delete Sublocation?</div>
      <p class="delete-panel-message">
        This will permanently delete this sublocation and its portrait. This cannot be undone.
      </p>
      <div class="delete-btn-row">
        <button class="btn-modal-cancel" (click)="cancelDelete()">Cancel</button>
        <button class="btn-modal-delete" (click)="executeDelete()">Delete</button>
      </div>
    </div>
  </div>
}
