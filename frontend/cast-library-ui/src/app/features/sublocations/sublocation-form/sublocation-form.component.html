<div class="pc scroll-body">
  <app-journal-title [title]="sublocationId() ? 'Edit Sublocation' : 'Sublocation Creation'" />
  <div class="wr wr-page-header">
    <a class="btn-ghost" routerLink="/dm/sublocations">← Library</a>
  </div>

  @if (sublocationId()) {
    <div class="form-card-preview">
      <app-sublocation-card
        [sublocation]="previewSublocation()"
        [editable]="false"
        [flippable]="false"
        [imageUpload]="true"
        (fileSelected)="onFileSelected($event)" />
    </div>
  }

  <form [formGroup]="form">
    <div class="form-portrait-new-row">      
      @if (!sublocationId()) {
        <label class="form-portrait-label" [class.form-portrait-label--filled]="imagePreviewUrl()">
          <input type="file" accept="image/jpeg,image/png,image/webp" class="form-portrait-file-input" (change)="onPortraitFileSelected($event)" />
          @if (imagePreviewUrl()) {
            <img [src]="imagePreviewUrl()!" class="form-portrait-img" alt="Portrait preview" />
            <div class="form-portrait-overlay">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
          } @else {
            <div class="form-portrait-empty">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <span class="form-portrait-hint">Portrait<br><em>optional</em></span>
            </div>
          }
        </label>
      }
      <div class="form-portrait-fields">
        <label class="fi-label">Sublocation Name</label>
        <input class="fi" formControlName="name" autocomplete="off" />
      </div>
    </div>
    <label class="fi-label">Description</label>
    <textarea class="fi" formControlName="description" rows="3" autocomplete="off"></textarea>
    <fieldset class="form-gm-box">
      <img src="/spilled_wine.PNG" alt="Spilled wine" class="spilled-wine-image" />
      <legend class="form-gm-box__legend">FOR GM EYES ONLY</legend>
      <label class="fi-label">GM Notes</label>
      <textarea class="fi" formControlName="dmNotes" rows="3" placeholder="Private notes…" autocomplete="off"></textarea>
    </fieldset>

    <div class="wr shop-header-row shop-header-row--spaced">
      <span class="section-label flex-1">Shop Inventory</span>
      <button type="button" class="btn-ghost" (click)="addItem()">+ Add Item</button>
    </div>

    <div formArrayName="shopItems">
      @for (item of shopItems.controls; track $index; let i = $index) {
        <div [formGroupName]="i" class="wb shop-item-card">
          <div class="wr shop-item-fields">
            <div class="form-field-wide">
              <label class="fi-label">Item Name</label>
              <input class="fi fi-no-mb" formControlName="name" placeholder="Iron Sword" autocomplete="off" />
            </div>
            <div class="form-field">
              <label class="fi-label">Price</label>
              <div class="price-input-group">
                <input class="fi fi-no-mb price-amount" type="number" formControlName="priceAmount"
                       min="1" max="9999" placeholder="15" />
                <select class="fi fi-no-mb price-currency" formControlName="priceCurrencyType">
                  <option value="cp">cp</option>
                  <option value="sp">sp</option>
                  <option value="ep">ep</option>
                  <option value="gp">gp</option>
                  <option value="pp">pp</option>
                </select>
              </div>
            </div>
            <button type="button" class="btn-ghost btn-item-remove" (click)="removeItem(i)">✕</button>
          </div>
          <label class="fi-label fi-label-mt">Description</label>
          <input class="fi" formControlName="description" placeholder="Well-balanced blade" autocomplete="off" />
        </div>
      }
    </div>
  </form>

  @if (limitError()) {
    <div class="limit-error-message">
      <span class="limit-error-text">{{ limitError() }}</span>
      <div class="limit-error-actions">
        @if (auth.isFreeTrial()) {
          <button class="limit-error-upgrade" (click)="openUpgradeDrawer()">Upgrade</button>
        }
        <button class="limit-error-close" (click)="limitError.set(null)">×</button>
      </div>
    </div>
  }

  <div class="form-save-footer">
    <div class="save-spark-host" #sparkHost>
      @if (sublocationId()) {
        <span class="save-label"
              [class.save-label--saving]="labelText() === 'Saving…'"
              [class.save-label--error]="labelText() === 'Error'">{{ labelText() }}</span>
      }
      <button class="campaign-primary-btn"
              [disabled]="form.invalid || saveStatus() === 'saving'"
              (click)="onSave($event)">Save</button>
    </div>
  </div>

</div>
