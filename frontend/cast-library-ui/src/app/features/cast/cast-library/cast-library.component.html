<div class="pc scroll-body">
  <app-journal-watermark pageType="cast" />
  <app-journal-title title="Cast Library" />
  <div class="wr wr-page-header">
    <app-upgrade-badge
      [visible]="auth.isFreeTrial()"
      (badgeClick)="openUpgradeDrawer()"
      class="upgrade-badge-library" />
    <input class="search-bar search-bar--header" type="text" placeholder="Name · Race · Role…"
           [value]="searchTerm()" (input)="searchTerm.set($any($event.target).value)" />
    <button class="campaign-primary-btn wr-ml-auto"
            [class.disabled]="castLimitReached() || isCreateDisabled()"
            [attr.disabled]="(castLimitReached() || isCreateDisabled()) ? 'true' : null"
            [routerLink]="(castLimitReached() || isCreateDisabled()) ? null : '/dm/cast/new'"
            (click)="(castLimitReached() || isCreateDisabled()) ? $event.preventDefault() : null">+ Create</button>
  </div>

  <div class="card-grid">
    @for (cast of filtered(); track cast.id) {
      <app-cast-card
        [cast]="cast"
        [tilt]="tiltFor(cast.id)"
        [dmMode]="true"
        (editClick)="edit(cast.id)"
        (deleteClick)="confirmDelete(cast.id)">
      </app-cast-card>
    }
    @empty {
      <p class="wbd-journal empty-state-pad">No cast found. Create your first cast member to get started.</p>
    }
  </div>
</div>

@if (pendingDeleteId()) {
  <div class="delete-overlay" (click)="cancelDelete()">
    <div class="delete-panel" (click)="$event.stopPropagation()">
      <div class="delete-panel-title">Delete Cast Member?</div>
      <p class="delete-panel-message">
        This will permanently delete this cast member and their portrait, and remove them from any campaigns. This cannot be undone.
      </p>
      <div class="delete-btn-row">
        <button class="btn-modal-cancel" (click)="cancelDelete()">Cancel</button>
        <button class="btn-modal-delete" (click)="executeDelete()">Delete</button>
      </div>
    </div>
  </div>
}
