<div class="pc scroll-body">
  <img src="/DoodleArt/tiefling_joke.PNG" class="cast-form-doodle-art" alt="Doodle art" />
  <app-journal-title [title]="castId() ? 'Edit Cast Member' : 'Cast Member Creation'" />
  <div class="wr wr-page-header">
    <a class="btn-ghost" routerLink="/dm/cast">← Library</a>
  </div>

  @if (castId()) {
    <div class="form-card-preview">
      <app-cast-card
        [cast]="previewCast()"
        [editable]="false"
        [flippable]="false"
        [showStars]="false"
        [dmMode]="true"
        [imageUpload]="true"
        (fileSelected)="onFileSelected($event)" />
    </div>
  }

  @if (!castId()) {
    <div class="randomize-button-container">
      <app-journal-randomize-button [randomizeGroupId]="'cast-form'"></app-journal-randomize-button>
    </div>
  }

  <form [formGroup]="form">
    <div class="form-portrait-new-row">
      @if (!castId()) {
        <label class="form-portrait-label" [class.form-portrait-label--filled]="imagePreviewUrl()">
          <input type="file" accept="image/jpeg,image/png,image/webp" class="form-portrait-file-input" (change)="onPortraitFileSelected($event)" />
          @if (imagePreviewUrl()) {
            <img [src]="imagePreviewUrl()!" class="form-portrait-img" alt="Portrait preview" />
            <div class="form-portrait-overlay">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
          } @else {
            <div class="form-portrait-empty">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <span class="form-portrait-hint">Portrait<br><em>optional</em></span>
            </div>
          }
        </label>
      }
      <div class="form-portrait-fields">
        <div class="wr form-row-gap">
          <div class="form-field-min">
            <label for="cast-name-input" class="fi-label">Name</label>
            <input id="cast-name-input" class="fi" formControlName="name" autocomplete="off" />
          </div>
          <div class="form-field-min">
            <app-journal-dropdown 
              [options]="roleOptions" 
              [label]="'Role / Class'"
              [control]="roleControl"
              [randomizeGroupId]="'cast-form'">
            </app-journal-dropdown>
          </div>
        </div>
        <div class="wr form-row-gap">
          <div class="form-field">
            <app-journal-dropdown 
              [options]="raceOptions" 
              [label]="'Race'"
              [control]="raceControl"
              [randomizeGroupId]="'cast-form'">
            </app-journal-dropdown>
          </div>
          <div class="form-field">
            <app-journal-dropdown 
              [options]="ageOptions"
              [label]="'Age'"
              [control]="ageControl"
              [randomizeGroupId]="'cast-form'">
            </app-journal-dropdown>
          </div>
          <app-journal-dropdown 
            [options]="pronounOptions" 
            [label]="'Pronouns'"
            [control]="pronounsControl"
            [randomizeGroupId]="'cast-form'">
          </app-journal-dropdown>
        </div>
      </div>
    </div>

    <div class="wr form-row-gap">
      <div class="form-field">
        <app-journal-dropdown 
          [options]="postureOptions" 
          [label]="'Posture'"
          [control]="postureControl"
          [randomizeGroupId]="'cast-form'">
        </app-journal-dropdown>
      </div>
      <div class="form-field">
        <app-journal-dropdown 
          [options]="speedOptions" 
          [label]="'Speed'"
          [control]="speedControl"
          [randomizeGroupId]="'cast-form'">
        </app-journal-dropdown>
      </div>
    </div>

    <label for="cast-public-desc-textarea" class="fi-label">Public Description (visible to players)</label>
    <textarea id="cast-public-desc-textarea" class="fi" formControlName="publicDescription" rows="3" placeholder="What players observe…" autocomplete="off"></textarea>

    <fieldset class="form-gm-box">
      <legend class="form-gm-box__legend">FOR GM EYES ONLY</legend>

      <div class="wr form-row-gap">
        <div class="form-field">
          <app-journal-dropdown 
            [options]="alignmentOptions" 
            [label]="'Alignment'"
            [control]="alignmentControl"
            [randomizeGroupId]="'cast-form'">
          </app-journal-dropdown>
        </div>
        <div class="form-field"></div>
      </div>

      <div class="voice-section">
        <label class="fi-label voice-section-label">Voice Placement (select all that apply)</label>
        <div class="wr" formArrayName="voicePlacement">
          @for (opt of voiceOptions; track opt; let i = $index) {
            <label class="wr checkbox-label">
              <input type="checkbox" [formControlName]="i" class="checkbox-input" />
              {{ opt }}
            </label>
          }
        </div>
      </div>

      <label for="cast-voice-notes-textarea" class="fi-label">Additional Voice Notes</label>
      <textarea id="cast-voice-notes-textarea" class="fi" formControlName="voiceNotes" rows="3" placeholder="Speaks with a slight stammer when nervous…" autocomplete="off"></textarea>

      <label for="cast-dm-desc-textarea" class="fi-label">DM Description (private notes)</label>
      <textarea id="cast-dm-desc-textarea" class="fi" formControlName="description" rows="4" placeholder="Your private notes on this cast member…" autocomplete="off"></textarea>

    </fieldset>
  </form>

  @if (limitError()) {
    <div class="limit-error-message">
      <span class="limit-error-text">{{ limitError() }}</span>
      <div class="limit-error-actions">
        @if (auth.isFreeTrial()) {
          <button class="limit-error-upgrade" (click)="openUpgradeDrawer()">Upgrade</button>
        }
        <button class="limit-error-close" (click)="limitError.set(null)">×</button>
      </div>
    </div>
  }

  <div class="form-save-footer">
    <div class="save-spark-host" #sparkHost>
      @if (castId()) {
        <span class="save-label"
              [class.save-label--saving]="labelText() === 'Saving…'"
              [class.save-label--error]="labelText() === 'Error'">{{ labelText() }}</span>
      }
      <button class="campaign-primary-btn"
              [disabled]="form.invalid || saveStatus() === 'saving'"
              (click)="onSave($event)">Save</button>
    </div>
  </div>

</div>
