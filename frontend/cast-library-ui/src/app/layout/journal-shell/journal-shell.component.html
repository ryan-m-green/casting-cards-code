<div class="journal-wrap" [class.is-cover]="isCover()">
  <div class="spine">
    <div class="spine-cap top"></div>
    @for (pct of spineBands; track pct) {
      <div class="spine-band" [style.top.%]="pct"></div>
    }
    @if (!isLoggedIn() && !isCover()) {
      <a class="spine-link spine-link--top" routerLink="/">Log in</a>
    }
    @if (showSpineLinks()) {
      <div class="spine-links">
        <a class="spine-link" routerLink="/about">About</a>
        <a class="spine-link" routerLink="/legal">Legal</a>
      </div>
    }
    <div class="spine-cap bottom"></div>
  </div>
  <div class="page-area">
    <!-- Layer 1: back page (z-index 1) — parchment base -->
    <div class="page page-back"></div>
    <!-- Layer 2: front page (z-index 2) — live router content -->
    <div class="page page-front">
      <router-outlet />
    </div>
    <!-- Layer 3: flip element (z-index 5) — 3D overlay, hidden at rest -->
    <div class="page-flip" #pageFlip>
      <div class="flip-face"></div>
      <div class="flip-back-face"></div>
    </div>
    <div class="page-fold"></div>

    <!-- Journal-opens overlay — shown after the cover flip completes -->
    <div class="journal-open-overlay" [class.show]="showOpenMessage()" [class.fading]="openMessageFading()">
      <svg class="journal-open-crest" width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="50" cy="50" r="44" stroke="rgba(180,120,40,0.4)" stroke-width="0.8"/>
        <circle cx="50" cy="50" r="40" stroke="rgba(180,120,40,0.2)" stroke-width="0.5"/>
        <circle cx="50" cy="50" r="22" stroke="rgba(180,120,40,0.35)" stroke-width="0.8"/>
        @for (line of crestStarLines; track $index) {
          <line
            [attr.x1]="line.x1" [attr.y1]="line.y1"
            [attr.x2]="line.x2" [attr.y2]="line.y2"
            [attr.stroke]="line.stroke"
            [attr.stroke-width]="line.strokeWidth"/>
        }
        <polygon points="50,34 56,50 50,66 44,50"
          stroke="rgba(200,140,50,0.55)" stroke-width="0.8" fill="rgba(180,120,40,0.12)"/>
        @for (tick of crestTicks; track $index) {
          <line
            [attr.x1]="tick.x1" [attr.y1]="tick.y1"
            [attr.x2]="tick.x2" [attr.y2]="tick.y2"
            stroke="rgba(180,120,40,0.3)" stroke-width="0.6"/>
        }
        <circle cx="50" cy="50" r="2.5" fill="rgba(200,150,50,0.6)"/>
      </svg>
      <div class="journal-open-text">The journal opens…</div>
    </div>
  </div>

  <app-journal-nav-drawer />

  <!-- Leather strap + buckle — visible on cover page only -->
  @if (isCover()) {
    <div class="strap">
      <div class="strap-grain"></div>
      <div class="strap-buckle">
        <div class="buckle-outer">
          <div class="buckle-bar"></div>
          <div class="buckle-pin"></div>
        </div>
      </div>
    </div>
  }
</div>
